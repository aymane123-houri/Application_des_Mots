<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Theme Selection</title>
    <style>
body {
    font-family: 'Arial', sans-serif;
    background-color: #eff306; /* Couleur de fond du corps */
    margin: 0;
    padding: 0;
}

.container {
    max-width: 1000px;
    margin: 50px auto;
    background-color: #e18535; /* Couleur de fond du conteneur */
    padding: 20px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    border-radius: 10px;
}

h1 {
    color: #333;
    text-align: center;
}

p {
    color: #666;
    text-align: center;
}

form {
    text-align: center;
}

.theme-option {
    display: inline-block;
    margin: 10px;
}

.theme-image {
    width: 150px;
    height: 150px;
    border-radius: 10px;
    box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    transition: transform 0.3s ease-in-out;
}

.theme-option:hover .theme-image {
    transform: scale(1.1);
}

input[type="radio"] {
    display: none;
}

label {
    cursor: pointer;
}

input[type="submit"] {
    background-color: #4caf50;
    color: #fff;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease-in-out;
}

input[type="submit"]:hover {
    background-color: #45a049;
}



.theme-option {
    display: inline-block;
    margin: 10px;
    text-align: center;
}

.theme-image {
    width: 150px;
    height: 150px;
    border-radius: 10px;
    box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    transition: transform 0.3s ease-in-out;
}

.theme-option label {
    cursor: pointer;
    display: flex;
    flex-direction: column; /* Afficher le contenu en colonne */
    align-items: center; /* Centrer le contenu horizontalement */
    text-align: center; /* Centrer le texte */
}

.theme-option .theme-name {
    font-weight: bold;
    margin-top: 5px;
}

.theme-option:hover .theme-image {
    transform: scale(1.1);
}


        
    </style>


</head>

</div>
