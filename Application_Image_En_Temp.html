        function initialiserImages(theme) {
            toutesLesImages = themes[theme].slice();
            shuffleArray(toutesLesImages);
            imagesRestantes = toutesLesImages.slice();
        }

        function shuffleArray(array) {
            for (var i = array.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
        }

        function finDuJeu() {
    if (isGameOver) return; // Empêche plusieurs game-overs
    isGameOver = true;

    // Cachez l'image
    document.getElementById('imageContainer').style.display = 'none';

    // Afficher félicitations
    document.getElementById('congratulations').style.display = 'block';

    // Calculer le temps final
    var now = new Date();
    var elapsed = Math.floor((now - startTime) / 1000); // Temps écoulé en secondes
    var minutes = Math.floor(elapsed / 60);
    var seconds = elapsed % 60;
    var tempsFinal = `${String(minutes).padStart(2, '0')} min ${String(seconds).padStart(2, '0')} sec`;

    // Afficher le score final
    document.getElementById('finalScore').style.display = 'block';
    document.getElementById('finalScore').innerHTML = `
        Votre score final : <span id="finalScoreValue">${score}</span><br>
        Temps écoulé : <span id="finalTime">${tempsFinal}</span>
    `;

    // Démarrer les confettis et animations
    startConfetti();
}

        document.addEventListener('DOMContentLoaded', function() {
            var urlParams = new URLSearchParams(window.location.search);
            var themeSelectionne = urlParams.get('theme');
            startTime = new Date(); // Initialiser l'horloge

            if (themeSelectionne) {
                initialiserImages(themeSelectionne);
                document.getElementById('afficherImageBtn').disabled = false;
                afficherImageSuivanteAvecDelai();
            }

            // Mettre à jour l'horloge
            setInterval(updateClock, 1000);

            document.addEventListener('keydown', function(event) {
                if (event.key === 'c') {
                    incrementerScore();
                }
            });
        });

        function updateClock() {
            var now = new Date();
            var elapsed = Math.floor((now - startTime) / 1000); // Temps écoulé en secondes
            var minutes = Math.floor(elapsed / 60);
            var seconds = elapsed % 60;
            document.getElementById('clock').innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function incrementerScore() {
            if (isGameOver) return; // Empêcher d'ajouter des points après le game over
            score++;
            document.getElementById('score').innerText = score;
        }

        function afficherImageSuivanteAvecDelai() {
            afficherImageSuivante();
            setTimeout(afficherImageSuivanteAvecDelai, 1000); // Afficher une image toutes les secondes
        }

        // Confetti animation (reste inchangé)
        let W = window.innerWidth;
        let H = window.innerHeight;
        const canvas = document.getElementById("canvas");
        const context = canvas.getContext("2d");
        const maxConfettis = 150;
        const particles = [];
        const possibleColors = [
            "DodgerBlue", "OliveDrab", "Gold", "Pink", "SlateBlue", 
            "LightBlue", "Gold", "Violet", "PaleGreen", "SteelBlue", 
            "SandyBrown", "Chocolate", "Crimson"
        ];

        function randomFromTo(from, to) {
            return Math.floor(Math.random() * (to - from + 1) + from);
        }

        function confettiParticle() {
            this.x = Math.random() * W;
            this.y = Math.random() * H - H;
            this.r = randomFromTo(11, 33);
            this.d = Math.random() * maxConfettis + 11;
            this.color = possibleColors[Math.floor(Math.random() * possibleColors.length)];
            this.tilt = Math.floor(Math.random() * 33) - 11;
            this.tiltAngleIncremental = Math.random() * 0.07 + 0.05;
            this.tiltAngle = 0;

            this.draw = function() {
                context.beginPath();
                context.lineWidth = this.r / 2;
                context.strokeStyle = this.color;
                context.moveTo(this.x + this.tilt + this.r / 3, this.y);
                context.lineTo(this.x + this.tilt, this.y + this.tilt + this.r / 5);
                return context.stroke();
            };
        }

        function startConfetti() {
            for (var i = 0; i < maxConfettis; i++) {
                particles.push(new confettiParticle());
            }

            function Draw() {
                const results = [];
                requestAnimationFrame(Draw);
                context.clearRect(0, 0, W, window.innerHeight);

                for (var i = 0; i < maxConfettis; i++) {
                    results.push(particles[i].draw());
                }

                let particle = {};
                let remainingFlakes = 0;
                for (var i = 0; i < maxConfettis; i++) {
                    particle = particles[i];
                    particle.tiltAngle += particle.tiltAngleIncremental;
                    particle.y += (Math.cos(particle.d) + 3 + particle.r / 2) / 2;
                    particle.tilt = Math.sin(particle.tiltAngle - i / 3) * 15;

                    if (particle.y <= H) remainingFlakes++;

                    if (particle.x > W + 30 || particle.x < -30 || particle.y > H) {
                        particle.x = Math.random() * W;
                        particle.y = -30;
                        particle.tilt = Math.floor(Math.random() * 10) - 20;
                    }
                }
                return results;
            }
            Draw();
        }
// Initialisation des dimensions du canevas
canvas.width = W;
canvas.height = H;
        window.addEventListener("resize", function() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
        });
